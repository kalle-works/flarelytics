name: Publish CLI

on:
  push:
    tags:
      - 'cli-v*'

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org
      - run: npm ci
      - run: npm run build
        working-directory: packages/create-flarelytics
      - run: npm run test
        working-directory: packages/create-flarelytics
      - run: npm publish --provenance
        working-directory: packages/create-flarelytics
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
