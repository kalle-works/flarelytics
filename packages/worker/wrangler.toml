name = "flarelytics"
main = "src/index.ts"
compatibility_date = "2025-03-01"
compatibility_flags = ["nodejs_compat"]

account_id = "4afa9a2ef256ff7f1cec9ed91ff03561"

[[analytics_engine_datasets]]
binding = "ANALYTICS"
dataset = "flarelytics"

[vars]
ALLOWED_ORIGINS = "https://mailtoolfinder.com,https://flarelytics.dev,http://localhost:4321"
DATASET_NAME = "flarelytics"

# Secrets (set via `wrangler secret put`):
#   QUERY_API_KEY  — random string for dashboard authentication
#   CF_API_TOKEN   — Cloudflare API token with Analytics Engine read access
#   CF_ACCOUNT_ID  — your Cloudflare account ID
